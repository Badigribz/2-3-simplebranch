<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Family Tree</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2642 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8f0ff;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 25, 50, 0.85);
      border: 1px solid rgba(60, 100, 180, 0.3);
      border-radius: 20px;
      padding: 50px 40px;
      backdrop-filter: blur(12px);
      box-shadow: 
        0 0 0 1px rgba(80, 140, 255, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e8f4ff;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
      margin-bottom: 8px;
    }

    .logo p {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(120, 180, 255, 0.6);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(140, 200, 255, 0.8);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 40, 80, 0.5);
      border: 1px solid rgba(80, 140, 255, 0.3);
      border-radius: 10px;
      color: #e8f4ff;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(120, 200, 255, 0.6);
      background: rgba(30, 60, 120, 0.6);
      box-shadow: 0 0 0 3px rgba(100, 180, 255, 0.1);
    }

    .form-input::placeholder {
      color: rgba(140, 200, 255, 0.4);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      cursor: pointer;
      accent-color: #4488ff;
    }

    .checkbox-wrapper label {
      font-size: 14px;
      color: rgba(180, 215, 255, 0.8);
      cursor: pointer;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(60, 140, 220, 0.8), rgba(40, 100, 200, 0.8));
      border: 1px solid rgba(100, 180, 255, 0.5);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(80, 160, 240, 0.9), rgba(60, 120, 220, 0.9));
      border-color: rgba(120, 200, 255, 0.7);
      box-shadow: 0 0 20px rgba(60, 140, 255, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(60, 120, 255, 0.3),
        transparent
      );
      margin: 30px 0;
    }

    .register-link {
      text-align: center;
      font-size: 14px;
      color: rgba(180, 215, 255, 0.7);
    }

    .register-link a {
      color: rgba(120, 200, 255, 0.9);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .register-link a:hover {
      color: #d8f0ff;
      text-decoration: underline;
    }

    .error-message {
      background: rgba(200, 50, 50, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #ffcccc;
      font-size: 14px;
      display: none;
    }

    .error-message.visible {
      display: block;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="logo">
      <h1>Family Tree</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="error-message" id="error-message">
      Invalid email or password
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          class="form-input" 
          placeholder="your.email@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          class="form-input" 
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <div class="remember-row">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="remember" name="remember" checked />
          <label for="remember">Remember me for 2 weeks</label>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">
        Sign In
      </button>
    </form>

    <div class="divider"></div>

    <div class="register-link">
      Don't have an account? <a href="./register.html">Register here</a>
    </div>
  </div>

  <script type="module" src="./login.js"></script>

</body>
</html>
