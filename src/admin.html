<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Family Tree</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2642 100%);
      min-height: 100vh;
      color: #e8f0ff;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(60, 120, 255, 0.3);
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e8f4ff;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: rgba(40, 100, 200, 0.45);
      border-color: rgba(100, 180, 255, 0.5);
      color: #e8f4ff;
    }

    .btn-primary:hover {
      background: rgba(50, 120, 230, 0.65);
      box-shadow: 0 0 18px rgba(60, 140, 255, 0.35);
    }

    .btn-secondary {
      background: rgba(200, 50, 50, 0.35);
      border-color: rgba(255, 100, 100, 0.4);
      color: #ffcccc;
    }

    .btn-secondary:hover {
      background: rgba(220, 60, 60, 0.55);
      box-shadow: 0 0 12px rgba(200, 60, 60, 0.3);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(15, 25, 50, 0.85);
      border: 1px solid rgba(60, 100, 180, 0.3);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(12px);
    }

    .stat-card h3 {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(120, 180, 255, 0.6);
      margin-bottom: 8px;
    }

    .stat-card .number {
      font-size: 36px;
      font-weight: 700;
      color: #e8f4ff;
      text-shadow: 0 0 14px rgba(80, 150, 255, 0.5);
    }

    .section {
      background: rgba(15, 25, 50, 0.85);
      border: 1px solid rgba(60, 100, 180, 0.3);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(12px);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(60, 120, 255, 0.2);
    }

    .section-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #e8f4ff;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge-pending {
      background: rgba(255, 180, 0, 0.2);
      color: #ffd97a;
      border: 1px solid rgba(255, 180, 0, 0.3);
    }

    .badge-active {
      background: rgba(50, 200, 100, 0.2);
      color: #90ff90;
      border: 1px solid rgba(50, 200, 100, 0.3);
    }

    .user-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .user-card {
      background: rgba(20, 40, 80, 0.4);
      border: 1px solid rgba(80, 140, 255, 0.25);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s ease;
    }

    .user-card:hover {
      border-color: rgba(100, 160, 255, 0.4);
      background: rgba(30, 50, 100, 0.5);
    }

    .user-info {
      margin-bottom: 16px;
    }

    .user-name {
      font-size: 18px;
      font-weight: 700;
      color: #e8f4ff;
      margin-bottom: 6px;
    }

    .user-email {
      font-size: 13px;
      color: rgba(140, 200, 255, 0.7);
      margin-bottom: 12px;
    }

    .user-note {
      background: rgba(10, 20, 50, 0.6);
      border-left: 3px solid rgba(100, 180, 255, 0.5);
      padding: 12px 16px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(200, 220, 255, 0.9);
      font-style: italic;
    }

    .user-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 12px;
    }

    .btn-success {
      background: rgba(50, 180, 100, 0.35);
      border-color: rgba(100, 255, 140, 0.4);
      color: #ccffdd;
    }

    .btn-success:hover {
      background: rgba(60, 200, 120, 0.5);
      box-shadow: 0 0 12px rgba(60, 200, 120, 0.3);
    }

    .btn-danger {
      background: rgba(200, 50, 50, 0.35);
      border-color: rgba(255, 100, 100, 0.4);
      color: #ffcccc;
    }

    .btn-danger:hover {
      background: rgba(220, 60, 60, 0.5);
      box-shadow: 0 0 12px rgba(200, 60, 60, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(140, 200, 255, 0.5);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(140, 200, 255, 0.7);
    }

    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(100, 180, 255, 0.3);
      border-top-color: rgba(100, 180, 255, 0.8);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    select, input {
      padding: 8px 12px;
      background: rgba(20, 40, 80, 0.5);
      border: 1px solid rgba(80, 140, 255, 0.3);
      border-radius: 6px;
      color: #e8f4ff;
      font-family: inherit;
      font-size: 13px;
    }

    select:focus, input:focus {
      outline: none;
      border-color: rgba(120, 200, 255, 0.6);
    }

    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 8px;
    }

    .role-admin {
      background: rgba(255, 100, 100, 0.2);
      color: #ffaaaa;
      border: 1px solid rgba(255, 100, 100, 0.3);
    }

    .role-editor {
      background: rgba(100, 180, 255, 0.2);
      color: #aaddff;
      border: 1px solid rgba(100, 180, 255, 0.3);
    }

    .role-viewer {
      background: rgba(140, 200, 255, 0.15);
      color: rgba(140, 200, 255, 0.8);
      border: 1px solid rgba(140, 200, 255, 0.25);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>Admin Panel</h1>
      <div class="header-actions">
        <a href="/" class="btn btn-primary">Back to Tree</a>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats">
      <div class="stat-card">
        <h3>Pending Users</h3>
        <div class="number" id="stat-pending">-</div>
      </div>
      <div class="stat-card">
        <h3>Active Users</h3>
        <div class="number" id="stat-active">-</div>
      </div>
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="number" id="stat-total">-</div>
      </div>
      <div class="stat-card">
        <h3>Admins</h3>
        <div class="number" id="stat-admins">-</div>
      </div>
    </div>

    <!-- Pending Users -->
    <div class="section">
      <div class="section-header">
        <h2>Pending Registrations</h2>
      </div>
      <div id="pending-users" class="user-list">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p style="margin-top: 12px;">Loading pending users...</p>
        </div>
      </div>
    </div>

    <!-- Active Users -->
    <div class="section">
      <div class="section-header">
        <h2>Active Users</h2>
      </div>
      <div id="active-users" class="user-list">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p style="margin-top: 12px;">Loading active users...</p>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="./admin.js"></script>

</body>
</html>
