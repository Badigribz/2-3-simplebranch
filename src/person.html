<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Member Profile</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2642 100%);
      color: #e8f0ff;
      min-height: 100vh;
      padding: 40px 20px;
    }

 /* ── Gallery button ────────────────────────── */
    .gallery-btn {
      position: fixed;
      top: 20px;
      left: 200px;  /* positioned right of back button */
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(20, 40, 80, 0.7);
      border: 1px solid rgba(80, 200, 140, 0.4);
      border-radius: 8px;
      color: #a8e0d0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      z-index: 100;
    }

    .gallery-btn:hover {
      background: rgba(30, 80, 70, 0.85);
      border-color: rgba(100, 240, 180, 0.6);
      color: #d8fff0;
      transform: translateY(-2px);
    }


 /* ── Gallery management ────────────────────── */
    .gallery-photo-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(80, 140, 255, 0.2);
      background: rgba(20, 40, 80, 0.3);
    }

    .gallery-photo-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .gallery-photo-info {
      padding: 8px;
      font-size: 12px;
      color: rgba(200, 220, 255, 0.8);
    }

    .gallery-photo-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(200, 50, 50, 0.9);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .gallery-photo-delete:hover {
      background: rgba(255, 80, 80, 1);
      transform: scale(1.1);
    }


    /* ── Back button ────────────────────────────── */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(20, 40, 80, 0.7);
      border: 1px solid rgba(80, 140, 255, 0.3);
      border-radius: 8px;
      color: #a8d0ff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      z-index: 100;
    }

    .back-btn:hover {
      background: rgba(30, 60, 120, 0.85);
      border-color: rgba(100, 180, 255, 0.6);
      color: #d8f0ff;
      transform: translateX(-3px);
    }

    /* ── Edit controls (top right) ───────────────── */
    .edit-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .btn {
      padding: 10px 18px;
      background: rgba(60, 140, 220, 0.25);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 8px;
      color: #a8d0ff;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: rgba(80, 160, 240, 0.4);
      border-color: rgba(120, 200, 255, 0.6);
      color: #fff;
    }

    .btn-save {
      background: rgba(60, 180, 100, 0.3);
      border-color: rgba(100, 220, 140, 0.5);
    }

    .btn-save:hover {
      background: rgba(80, 200, 120, 0.5);
      border-color: rgba(120, 240, 160, 0.7);
    }

    .btn-cancel {
      background: rgba(200, 80, 80, 0.25);
      border-color: rgba(255, 120, 120, 0.4);
    }

    .btn-cancel:hover {
      background: rgba(220, 100, 100, 0.4);
      border-color: rgba(255, 140, 140, 0.6);
    }

    .edit-mode-only {
      display: none;
    }

    body.editing .edit-mode-only {
      display: block;
    }

    body.editing .view-mode-only {
      display: none;
    }

    /* ── Main container ────────────────────────── */
    .profile-container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(15, 25, 50, 0.6);
      border: 1px solid rgba(60, 100, 180, 0.25);
      border-radius: 20px;
      padding: 60px;
      backdrop-filter: blur(12px);
      box-shadow: 
        0 0 0 1px rgba(80, 140, 255, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* ── Header section ────────────────────────── */
    .profile-header {
      text-align: center;
      margin-bottom: 50px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(80, 140, 255, 0.15);
    }

    .photo-wrapper {
      position: relative;
      width: 180px;
      margin: 0 auto 24px;
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(100, 180, 255, 0.4);
      box-shadow: 
        0 0 0 8px rgba(20, 40, 100, 0.3),
        0 0 30px rgba(60, 140, 255, 0.25);
      display: block;
    }

    .profile-photo-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(60, 120, 200, 0.3), rgba(40, 80, 160, 0.3));
      border: 4px solid rgba(100, 180, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      color: rgba(140, 200, 255, 0.4);
    }

    .photo-upload-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(60, 140, 220, 0.9);
      border: 2px solid rgba(100, 180, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .photo-upload-btn:hover {
      background: rgba(80, 160, 240, 1);
      transform: scale(1.1);
    }

    .profile-name {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #e8f4ff;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.4);
      margin-bottom: 8px;
    }

    .profile-dates {
      font-size: 16px;
      color: rgba(140, 200, 255, 0.7);
      letter-spacing: 0.08em;
    }

    /* ── Editable fields ───────────────────────── */
    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      background: rgba(20, 40, 80, 0.4);
      border: 1px solid rgba(80, 140, 255, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8f4ff;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(120, 200, 255, 0.6);
      background: rgba(30, 60, 120, 0.5);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }

    /* ── Content sections ──────────────────────── */
    .profile-section {
      margin-bottom: 40px;
    }

    .profile-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(120, 180, 255, 0.6);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(80, 140, 255, 0.15);
    }

    .section-content {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(200, 220, 255, 0.85);
    }

    .section-content p {
      margin-bottom: 14px;
    }

    .section-content p:last-child {
      margin-bottom: 0;
    }

    /* ── Info grid ─────────────────────────────── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .info-item {
      background: rgba(20, 40, 80, 0.3);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid rgba(80, 140, 255, 0.15);
    }

    .info-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(120, 180, 255, 0.5);
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 500;
      color: #d8f0ff;
    }

    /* ── Empty states ──────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: rgba(140, 200, 255, 0.4);
      font-style: italic;
    }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 768px) {
      .profile-container {
        padding: 40px 30px;
      }

      .profile-name {
        font-size: 32px;
      }

      .back-btn, .edit-controls {
        top: 10px;
      }

      .back-btn {
        left: 10px;
      }

      .edit-controls {
        right: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Back to tree button -->
  <a href="/" class="back-btn">
    <span>←</span> Back to Family Tree
  </a>

  <!-- Gallery button -->
  <a href="#" class="gallery-btn" id="gallery-btn">
    <span>📸</span> View Gallery
  </a>

  <!-- Edit controls -->
  <div class="edit-controls">
    <button class="btn view-mode-only" id="btn-edit">✏️ Edit Profile</button>
    <button class="btn btn-save edit-mode-only" id="btn-save">💾 Save Changes</button>
    <button class="btn btn-cancel edit-mode-only" id="btn-cancel">✕ Cancel</button>
  </div>

  <div class="profile-container">

    <!-- Header: Photo + Name + Dates -->
    <div class="profile-header">
      <div class="photo-wrapper">
        <div class="profile-photo-placeholder" id="photo-container">👤</div>
        <label class="photo-upload-btn edit-mode-only" for="photo-upload">📷</label>
        <input type="file" id="photo-upload" accept="image/*" style="display: none;">
      </div>

      <h1 class="profile-name" id="profile-name">Loading...</h1>
      <div class="profile-dates" id="profile-dates">—</div>
    </div>

    <!-- Bio section -->
    <div class="profile-section">
      <h2 class="section-title">Biography</h2>
      <div class="section-content">
        <div id="bio-view" class="view-mode-only">
          <p class="empty-state">No biography available yet.</p>
        </div>
        <textarea id="bio-edit" class="edit-mode-only" placeholder="Write a biography..."></textarea>
      </div>
    </div>

    <!-- Structured info -->
    <div class="profile-section">
      <h2 class="section-title">Details</h2>
      <div class="info-grid">
        
        <div class="info-item">
          <div class="info-label">Birth Date</div>
          <div class="info-value view-mode-only" id="birth-date-view">—</div>
          <input type="date" class="edit-mode-only" id="birth-date-edit">
        </div>

        <div class="info-item">
          <div class="info-label">Birth Place</div>
          <div class="info-value view-mode-only" id="birth-place-view">—</div>
          <input type="text" class="edit-mode-only" id="birth-place-edit" placeholder="City, Country">
        </div>

        <div class="info-item">
          <div class="info-label">Death Date</div>
          <div class="info-value view-mode-only" id="death-date-view">—</div>
          <input type="date" class="edit-mode-only" id="death-date-edit">
        </div>

      </div>
    </div>

<!-- Photo Gallery Management -->
    <div class="profile-section">
      <h2 class="section-title">Photo Gallery</h2>
      
      <!-- View mode: Show photo count -->
      <div class="view-mode-only">
        <p id="gallery-summary" style="color: rgba(200, 220, 255, 0.7);">
          Loading photos...
        </p>
      </div>

      <!-- Edit mode: Upload photos -->
      <div class="edit-mode-only">
        <div style="margin-bottom: 20px;">
          <label for="gallery-upload" class="btn" style="display: inline-flex; cursor: pointer;">
            📤 Add Photos to Gallery
          </label>
          <input type="file" id="gallery-upload" accept="image/*" multiple style="display: none;">
        </div>
        
        <!-- Photo list for management -->
        <div id="gallery-photos" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px;">
          <!-- Photos loaded here -->
        </div>
      </div>
    </div>

  </div>

  <!-- Load person data and handle editing -->
  <script type="module" src="./person.js"></script>

</body>
</html>
