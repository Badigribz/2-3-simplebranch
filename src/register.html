<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Family Tree</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2642 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8f0ff;
      padding: 20px;
    }

    .register-container {
      width: 100%;
      max-width: 480px;
      background: rgba(15, 25, 50, 0.85);
      border: 1px solid rgba(60, 100, 180, 0.3);
      border-radius: 20px;
      padding: 50px 40px;
      backdrop-filter: blur(12px);
      box-shadow: 
        0 0 0 1px rgba(80, 140, 255, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e8f4ff;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
      margin-bottom: 8px;
    }

    .logo p {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(120, 180, 255, 0.6);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(140, 200, 255, 0.8);
      margin-bottom: 8px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(20, 40, 80, 0.5);
      border: 1px solid rgba(80, 140, 255, 0.3);
      border-radius: 10px;
      color: #e8f4ff;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .form-textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.5;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: rgba(120, 200, 255, 0.6);
      background: rgba(30, 60, 120, 0.6);
      box-shadow: 0 0 0 3px rgba(100, 180, 255, 0.1);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: rgba(140, 200, 255, 0.4);
    }

    .form-hint {
      font-size: 12px;
      color: rgba(140, 200, 255, 0.6);
      margin-top: 6px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(60, 140, 220, 0.8), rgba(40, 100, 200, 0.8));
      border: 1px solid rgba(100, 180, 255, 0.5);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      margin-bottom: 16px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(80, 160, 240, 0.9), rgba(60, 120, 220, 0.9));
      border-color: rgba(120, 200, 255, 0.7);
      box-shadow: 0 0 20px rgba(60, 140, 255, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(60, 120, 255, 0.3),
        transparent
      );
      margin: 30px 0;
    }

    .login-link {
      text-align: center;
      font-size: 14px;
      color: rgba(180, 215, 255, 0.7);
    }

    .login-link a {
      color: rgba(120, 200, 255, 0.9);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .login-link a:hover {
      color: #d8f0ff;
      text-decoration: underline;
    }

    .error-message,
    .success-message {
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      line-height: 1.5;
    }

    .error-message {
      background: rgba(200, 50, 50, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.4);
      color: #ffcccc;
    }

    .success-message {
      background: rgba(50, 200, 100, 0.2);
      border: 1px solid rgba(100, 255, 140, 0.4);
      color: #ccffdd;
    }

    .error-message.visible,
    .success-message.visible {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #register-form.hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="register-container">
    <div class="logo">
      <h1>Family Tree</h1>
      <p>Request Access</p>
    </div>

    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name"
          class="form-input" 
          placeholder="John Smith"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          class="form-input" 
          placeholder="your.email@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          class="form-input" 
          placeholder="••••••••"
          required
          autocomplete="new-password"
          minlength="8"
        />
        <div class="form-hint">At least 8 characters</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password-confirm">Confirm Password</label>
        <input 
          type="password" 
          id="password-confirm" 
          name="password_confirmation"
          class="form-input" 
          placeholder="••••••••"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="registration-note">Who are you?</label>
        <textarea 
          id="registration-note" 
          name="registration_note"
          class="form-textarea" 
          placeholder="e.g., I'm John's son, Mike's nephew, married to Sarah..."
          required
        ></textarea>
        <div class="form-hint">Help the administrator identify you in the family tree</div>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">
        Request Access
      </button>
    </form>

    <div class="divider"></div>

    <div class="login-link">
      Already have an account? <a href="./login.html">Sign in here</a>
    </div>
  </div>

  <script type="module" src="./register.js"></script>

</body>
</html>
